<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="CrowdPulse">
  <defs>
    <radialGradient id="pulseGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.95" />
      <stop offset="45%" stop-color="#00f0ff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#pulseGlow)" />
  <circle cx="16" cy="16" r="5" fill="#00f0ff" filter="url(#softGlow)" />
</svg>
